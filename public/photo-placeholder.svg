  <rect width="400" height="400" fill="url(#grid)"/>
  <circle cx="200" cy="155" r="58" stroke="#00f0ff" stroke-width="2" stroke-opacity="0.4"/>
  <path d="M95 310c0-58 47-105 105-105s105 47 105 105" stroke="#ff2a6d" stroke-width="2" stroke-opacity="0.5"/>
  <rect x="0" y="180" width="400" height="40" fill="url(#scan)" opacity="0.6"/>
